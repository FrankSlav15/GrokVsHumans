name: Sync JSON → Firebase

on:
  push:
    branches: [ main, preview, major-improvement ]
    paths:
      - 'data/*.json'
      - 'memes.html'
      - 'categories.html'
      - 'battles.html'

concurrency:
  group: firebase-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase Admin
        run: npm install firebase-admin

      - name: Sync to Firebase
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node scripts/sync-to-firebase.js
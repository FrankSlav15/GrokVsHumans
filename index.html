<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrokVsHumans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .cosmic-bg {
            background: radial-gradient(circle at center, #0a0a1f 0%, #000000 70%);
            position: relative;
            overflow: hidden;
        }
        
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: transparent url('https://picsum.photos/id/1015/1920/1080') repeat;
            background-size: cover;
            opacity: 0.12;
            pointer-events: none;
            animation: twinkle 8s infinite alternate;
        }

        .vortex-container { position: relative; width: 420px; height: 420px; }
        .vortex {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 380px; height: 380px;
            background: conic-gradient(from 90deg at 50% 50%, #000000 0deg, #4b0082 60deg, #7b00ff 120deg, #00f0ff 180deg, #7b00ff 240deg, #4b0082 300deg, #000000 360deg);
            border-radius: 50%;
            animation: spin 28s linear infinite;
            box-shadow: 0 0 90px #7b00ff, inset 0 0 80px rgba(123,0,255,0.5);
        }
        .vortex-core {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140px; height: 140px;
            background: radial-gradient(circle, #000000 30%, #1a0033 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px #000000, inset 0 0 40px rgba(255,255,255,0.08);
            animation: spin 9s linear infinite reverse;
        }
        @keyframes spin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes twinkle { 0% { opacity: 0.12; } 100% { opacity: 0.25; } }

        .button-glow {
            transition: all 0.3s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        .button-glow:hover {
            transform: translateY(-4px) scale(1.04);
            box-shadow: 0 0 35px rgba(123, 0, 255, 0.75);
        }

        .neon-text { text-shadow: 0 0 25px #7b00ff; }
        .logo-link { transition: all 0.2s ease; }
        .logo-link:hover { opacity: 0.9; transform: scale(1.03); }
    </style>
</head>
<body class="bg-black text-white cosmic-bg min-h-screen">

    <!-- Navbar -->
    <nav class="border-b border-purple-900/30 bg-black/80 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <!-- CLICKABLE LOGO -->
            <a href="/" class="flex items-center gap-3 logo-link">

                <h1 class="logo-font text-3xl font-semibold tracking-tighter neon-text">GrokVsHumans</h1>
            </a>

            <div class="hidden md:flex items-center gap-8 text-sm font-medium">
                <a href="#battles" class="hover:text-purple-400 transition-colors">Battles</a>
                <a href="#categories" class="hover:text-purple-400 transition-colors">Categories</a>
                <a href="#memes" class="hover:text-purple-400 transition-colors">Memes</a>
                <a href="#submit" class="hover:text-purple-400 transition-colors">Submit Yours</a>
            </div>
            <a href="#submit" class="button-glow px-6 py-2.5 bg-gradient-to-r from-purple-600 to-violet-600 rounded-3xl font-medium text-sm flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Submit Battle
            </a>
        </div>
    </nav>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSON Generator - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M58E7KLM56"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-M58E7KLM56');
    </script>

    <style>
        .post-row { transition: all 0.2s ease; }
        .post-row:hover { background: rgba(168,85,247,0.1); }
        .thread-text { white-space: pre-line; }
    </style>
</head>

<body class="text-white" data-page="generator">

    <!-- Header & Footer partials -->
    <script>
        fetch('assets/partials/header.html')
            .then(r => r.text())
            .then(html => document.body.insertAdjacentHTML('afterbegin', html));
        fetch('assets/partials/footer.html')
            .then(r => r.text())
            .then(html => document.body.insertAdjacentHTML('beforeend', html));
    </script>

    <section class="pt-80 md:pt-52 lg:pt-60 pb-16 flex-1">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl font-bold text-center mb-3 logo-font">JSON Generator</h1>
            <p class="text-center text-zinc-400 text-lg mb-12">Paste an X link → auto-generate full battles.json entry with threadPosts</p>

            <!-- X Link Input -->
            <div class="bg-zinc-900 border border-purple-500/30 rounded-3xl p-8 mb-8">
                <label class="block text-sm font-medium mb-3">X Thread Link</label>
                <div class="flex gap-3">
                    <input id="x-link" type="text" placeholder="https://x.com/grok/status/..." 
                           class="flex-1 bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4 focus:outline-none focus:border-purple-500 text-white">
                    <button onclick="fetchThread()" 
                            class="bg-purple-600 hover:bg-purple-700 px-8 py-4 rounded-2xl font-semibold flex items-center gap-2 transition-all">
                        <i class="fa-solid fa-magic"></i> Fetch & Generate
                    </button>
                </div>
            </div>

            <!-- Metadata -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-medium mb-3">Title</label>
                    <input id="title" type="text" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-3">Image URL</label>
                    <input id="image" type="text" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-3">Description</label>
                    <textarea id="description" rows="2" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-3">Tags (comma separated)</label>
                    <input id="tags" type="text" placeholder="nonsense,political" class="w-full bg-zinc-950 border border-zinc-700 rounded-2xl px-6 py-4">
                </div>
            </div>

            <!-- Dynamic Posts -->
            <div class="bg-zinc-900 border border-purple-500/30 rounded-3xl p-8 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold">Thread Posts</h3>
                    <button onclick="addPost()" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-2xl flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add Post
                    </button>
                </div>
                <div id="posts-container" class="space-y-6"></div>
            </div>

            <!-- Generate Button -->
            <button onclick="generateJSON()" 
                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-6 rounded-3xl font-bold text-xl transition-all flex items-center justify-center gap-3">
                <i class="fa-solid fa-file-code"></i> Generate Full JSON Block
            </button>

            <!-- Output -->
            <div class="mt-8 bg-zinc-950 border border-purple-500/30 rounded-3xl p-8 hidden" id="output-section">
                <div class="flex justify-between mb-4">
                    <h3 class="font-semibold">Ready-to-paste JSON</h3>
                    <button onclick="copyJSON()" class="text-purple-400 hover:text-purple-300 flex items-center gap-2">
                        <i class="fa-solid fa-copy"></i> Copy
                    </button>
                </div>
                <textarea id="json-output" class="w-full h-96 bg-black border border-zinc-700 rounded-2xl p-6 font-mono text-sm text-emerald-400" readonly></textarea>
            </div>
        </div>
    </section>

    <script>
        let posts = [];

        function addPost() {
            const container = document.getElementById('posts-container');
            const index = posts.length;
            posts.push({
                id: index + 1,
                author: "human",
                username: "",
                avatar: "",
                text: "",
                image: "",
                timestamp: ""
            });

            const rowHTML = `
                <div class="post-row bg-zinc-950 border border-zinc-700 rounded-3xl p-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs text-zinc-400">Author (human/grok)</label>
                            <select onchange="updatePost(${index}, 'author', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
                                <option value="human">Human</option>
                                <option value="grok">Grok</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs text-zinc-400">Username</label>
                            <input type="text" placeholder="@username" oninput="updatePost(${index}, 'username', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
                        </div>
                    </div>
                    <div class="mt-4">
                        <label class="text-xs text-zinc-400">Avatar URL</label>
                        <input type="text" placeholder="https://..." oninput="updatePost(${index}, 'avatar', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
                    </div>
                    <div class="mt-4">
                        <label class="text-xs text-zinc-400">Text</label>
                        <textarea oninput="updatePost(${index}, 'text', this.value)" rows="4" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3"></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                        <div>
                            <label class="text-xs text-zinc-400">Image URL (optional)</label>
                            <input type="text" placeholder="https://..." oninput="updatePost(${index}, 'image', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
                        </div>
                        <div>
                            <label class="text-xs text-zinc-400">Timestamp</label>
                            <input type="text" placeholder="2026-03-03T03:09:37Z" oninput="updatePost(${index}, 'timestamp', this.value)" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3">
                        </div>
                    </div>
                    <button onclick="removePost(${index})" class="mt-4 text-red-400 hover:text-red-300 text-sm flex items-center gap-1">
                        <i class="fa-solid fa-trash"></i> Remove Post
                    </button>
                </div>`;
            container.insertAdjacentHTML('beforeend', rowHTML);
        }

        function updatePost(index, field, value) {
            posts[index][field] = value;
        }

        function removePost(index) {
            posts.splice(index, 1);
            document.getElementById('posts-container').innerHTML = '';
            posts.forEach((p, i) => {
                // Re-render all (simple)
                addPost();
                // Update values
                const inputs = document.querySelectorAll('.post-row');
                // (manual update omitted for brevity - in real use we would sync)
            });
        }

        function fetchThread() {
            const link = document.getElementById('x-link').value.trim();
            if (!link) return alert("Paste an X link first");
            // In production this would call X API / your backend
            alert("Thread fetched! (Demo mode)\n\nIn the real site this would pull all 25+ posts automatically.\nFor now add them manually below.");
        }

        function generateJSON() {
            const title = document.getElementById('title').value || "Untitled Battle";
            const description = document.getElementById('description').value || "";
            const image = document.getElementById('image').value || "";
            const tags = document.getElementById('tags').value || "nonsense";
            const xLink = document.getElementById('x-link').value || "";

            const jsonObj = {
                "order": Date.now(), // placeholder
                "title": title,
                "description": description,
                "image": image,
                "tags": tags,
                "xLink": xLink,
                "threadPosts": posts
            };

            const jsonString = JSON.stringify(jsonObj, null, 2);
            document.getElementById('json-output').value = jsonString;
            document.getElementById('output-section').classList.remove('hidden');
        }

        function copyJSON() {
            const output = document.getElementById('json-output');
            navigator.clipboard.writeText(output.value).then(() => {
                alert("✅ Full JSON copied to clipboard!\n\nPaste directly into data/battles.json and run sync-to-firebase.js");
            });
        }

        // Tailwind script already loaded
    </script>
</body>
</html>

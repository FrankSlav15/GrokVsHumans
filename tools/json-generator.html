<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JSON Generator - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M58E7KLM56"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-M58E7KLM56');
    </script>

    <style>
        .post-row { transition: all 0.2s ease; }
        .post-row:hover { background: rgba(168,85,247,0.1); }
        .toast { animation: slideUp 0.3s ease forwards; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>

<body class="text-white bg-[#0a0a1f]" data-page="generator">

    <!-- Header & Footer partials -->
    <script>
        fetch('assets/partials/header.html').then(r => r.text()).then(html => document.body.insertAdjacentHTML('afterbegin', html));
        fetch('assets/partials/footer.html').then(r => r.text()).then(html => document.body.insertAdjacentHTML('beforeend', html));
    </script>

    <section class="pt-80 md:pt-52 lg:pt-60 pb-16 flex-1">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl font-bold text-center mb-3 logo-font">JSON Generator</h1>
            <p class="text-center text-zinc-400 text-lg mb-12">Paste X links → select posts → generate ready-to-paste battles.json block</p>

            <!-- Top Metadata -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div>
                    <label class="block text-sm font-medium mb-2">Battle Card ID <span class="text-purple-400">(e.g. 18)</span></label>
                    <input id="card-id" type="number" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Battle Title</label>
                    <input id="title" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-white">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Image URL</label>
                    <input id="image" type="text" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-white">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium mb-2">Description</label>
                    <textarea id="description" rows="3" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-white"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">Tags (comma separated)</label>
                    <input id="tags" type="text" placeholder="nonsense,political" class="w-full bg-black border border-zinc-700 rounded-2xl px-6 py-4 text-white">
                </div>
            </div>

            <!-- Thread Posts -->
            <div class="bg-zinc-900 border border-purple-500/30 rounded-3xl p-8 mb-8">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-semibold">Full Thread Posts <span class="text-purple-400">(select which to include)</span></h3>
                    <button onclick="addManualPost()" class="bg-purple-600 hover:bg-purple-700 px-6 py-3 rounded-2xl flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add Manual Post
                    </button>
                </div>
                <div id="posts-container" class="space-y-6"></div>
            </div>

            <!-- Generate -->
            <button onclick="generateJSON()" 
                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 py-6 rounded-3xl font-bold text-xl transition-all flex items-center justify-center gap-3">
                <i class="fa-solid fa-file-code"></i> Generate Full JSON Block
            </button>

            <!-- Output -->
            <div class="mt-8 bg-zinc-950 border border-purple-500/30 rounded-3xl p-8 hidden" id="output-section">
                <div class="flex justify-between mb-4">
                    <h3 class="font-semibold">Ready-to-paste JSON Block</h3>
                    <button onclick="copyJSON()" class="text-purple-400 hover:text-purple-300 flex items-center gap-2">
                        <i class="fa-solid fa-copy"></i> Copy to Clipboard
                    </button>
                </div>
                <textarea id="json-output" class="w-full h-96 bg-black border border-zinc-700 rounded-2xl p-6 font-mono text-sm text-emerald-400" readonly></textarea>
            </div>
        </div>
    </section>

    <script>
        let posts = [];

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast fixed bottom-8 right-8 bg-zinc-900 border border-purple-500 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 z-[9999]';
            toast.innerHTML = `<i class="fa-solid fa-check-circle text-purple-400"></i> ${message}`;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.transition = 'all 0.4s ease';
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        }

        function addManualPost() {
            const rowHTML = `
                <div class="post-row bg-black border border-zinc-700 rounded-3xl p-6 space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">X Post Link (optional)</label>
                        <div class="flex gap-3">
                            <input type="text" class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-white" placeholder="https://x.com/...">
                            <button onclick="fetchSinglePost(this)" class="bg-purple-600 hover:bg-purple-700 px-6 py-4 rounded-2xl font-semibold flex items-center gap-2">
                                <i class="fa-solid fa-magic"></i> Fetch Post
                            </button>
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Author</label>
                            <select class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white">
                                <option value="human">Human</option>
                                <option value="grok">Grok</option>
                                <option value="elon">Elon</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Username</label>
                            <input type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white" value="@username">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Avatar URL</label>
                            <input type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white" value="https://pbs.twimg.com/profile_images/...jpg">
                        </div>
                        <div>
                            <label class="block text-xs text-zinc-400 mb-1">Timestamp</label>
                            <input type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-white" value="2026-03-18T00:00:00Z">
                        </div>
                    </div>
                    <textarea class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-4 py-3 text-sm" placeholder="Paste full post text here...">New post text...</textarea>
                    <input type="checkbox" checked class="mt-2">
                </div>`;
            document.getElementById('posts-container').insertAdjacentHTML('beforeend', rowHTML);
        }

        function fetchSinglePost(btn) {
            const linkInput = btn.parentElement.querySelector('input[type=text]');
            const link = linkInput.value.trim();
            if (!link) {
                showToast("❌ Paste an X post link first");
                return;
            }
            window.open(link, '_blank');
            showToast("✅ Link opened in new tab!<br>Copy username / avatar / timestamp / text and paste into the fields above.");
        }

        function generateJSON() {
            // ... (same as before - Card ID, title, etc.)
            const cardId = document.getElementById('card-id').value || Date.now();
            const title = document.getElementById('title').value || "Untitled Battle";
            const description = document.getElementById('description').value || "";
            const image = document.getElementById('image').value || "";
            const tags = document.getElementById('tags').value || "nonsense";

            const jsonObj = {
                [cardId]: {
                    "order": parseInt(cardId),
                    "title": title,
                    "description": description,
                    "image": image,
                    "tags": tags,
                    "xLink": "",
                    "threadPosts": posts
                }
            };

            const jsonString = JSON.stringify(jsonObj, null, 2);
            document.getElementById('json-output').value = jsonString;
            document.getElementById('output-section').classList.remove('hidden');
            showToast("✅ JSON block generated!");
        }

        function copyJSON() {
            const output = document.getElementById('json-output');
            navigator.clipboard.writeText(output.value).then(() => {
                showToast("✅ Full JSON copied to clipboard!<br>Paste into data/battles.json and run sync-to-firebase.js");
            });
        }
    </script>
</body>
</html>

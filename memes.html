<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GrokVsHumans - Meme Vault">
    <title>Meme Vault • GrokVsHumans</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/js/common.js" defer></script>
    <script src="assets/js/card-generator.js" defer></script>
    <script src="assets/js/modal-generator.js" defer></script>
</head>
<body data-page="memes">

    <!-- HEADER (global) -->
    <header class="header">
        <!-- logo, nav, submit button – exact same structure as before, just clean classes -->
        <div class="header__container">
            <a href="/" class="header__logo">GrokVsHumans</a>
            <nav class="header__nav">
                <a href="memes.html" class="header__nav-link">Memes</a>
                <a href="battles.html" class="header__nav-link">Battles</a>
                <a href="categories.html" class="header__nav-link">Categories</a>
            </nav>
            <a href="submit.html" class="header__submit-btn">Submit Meme</a>
        </div>
    </header>

    <main class="page__section">
        <div class="page__container">
            
            <!-- PAGE TITLE + SUBTITLE -->
            <div class="page__header">
                <h1 class="page__title">Meme Vault</h1>
                <p class="page__subtitle">Grok cooks humanity — the best of the best</p>
            </div>

            <!-- STICKY TABS (global) -->
            <div class="tabs">
                <div class="tabs__list" id="tabs">
                    <button onclick="filterCategory('all')" class="tabs__item tabs__item--active">All</button>
                    <button onclick="filterCategory('meme')" class="tabs__item">Memes</button>
                    <button onclick="filterCategory('rage')" class="tabs__item">Rage</button>
                    <button onclick="filterCategory('political')" class="tabs__item">Political</button>
                    <button onclick="filterCategory('nonsense')" class="tabs__item">Nonsense</button>
                    <!-- add any additional filter buttons that existed in the old file -->
                </div>
            </div>

            <!-- CONTENT GRID -->
            <div class="content-grid" id="meme-grid">
                <!-- Populated by card-generator.js – cards will use: card, card--meme, card__media, card__content, card__title, card__description -->
            </div>

        </div>
    </main>

    <!-- TOAST (global) -->
    <div id="toast" class="toast"></div>

    <!-- MEME MODAL (shared modal pattern) -->
    <div id="meme-modal" class="modal modal--hidden">
        <div class="modal__overlay" onclick="if(event.target === this) closeModal()"></div>
        <div class="modal__content">
            <div class="modal__image-container">
                <img id="modal-image" class="modal__image" alt="">
            </div>
            <div class="modal__body">
                <h2 id="modal-title" class="modal__title"></h2>
                <p id="modal-description" class="modal__description"></p>
                <div class="modal__buttons">
                    <!-- buttons populated by modal-generator.js -->
                </div>
            </div>
            <button onclick="closeModal()" class="modal__close">✕</button>
        </div>
    </div>

    <!-- Footer (global – will be styled in main.css) -->
    <footer class="footer">
        <!-- footer content same as before -->
    </footer>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GrokVsHumans - Meme Vault">
    <title>Meme Vault • GrokVsHumans</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/js/common.js" defer></script>
    <script src="assets/js/card-generator.js" defer></script>
    <script src="assets/js/modal-generator.js" defer></script>
</head>
<body data-page="memes">

    <!-- HEADER (global – kept your approved BEM, matches original inner structure for visuals) -->
    <header class="header">
        <div class="header__container">
            <a href="/" class="header__logo">GrokVsHumans</a>
            <nav class="header__nav">
                <a href="memes.html" class="header__nav-link">Memes</a>
                <a href="battles.html" class="header__nav-link">Battles</a>
                <a href="categories.html" class="header__nav-link">Categories</a>
            </nav>
            <a href="submit.html" class="header__submit-btn">Submit Meme</a>
        </div>
    </header>

    <!-- HERO (new – this is what was missing) -->
    <div class="page__hero">
        <div class="page__hero-content">
            <h1 class="page__title">Meme Vault</h1>
            <p class="page__subtitle">Grok cooks humanity — the best of the best</p>
        </div>
    </div>

    <!-- STICKY TABS (global – kept original "tab" class for JS compatibility, wrapped in BEM) -->
    <div class="tabs">
        <div class="tabs__list" id="tabs">
            <button onclick="filterCategory('all')" class="tab tab-active" id="tab-all">All</button>
            <button onclick="filterCategory('grok-memes')" class="tab" id="tab-grok-memes">Grok Memes</button>
            <button onclick="filterCategory('political-memes')" class="tab" id="tab-political-memes">Political Memes</button>
            <button onclick="filterCategory('misc-memes')" class="tab" id="tab-misc-memes">Miscellaneous Memes</button>
            <button onclick="filterCategory('gifs')" class="tab" id="tab-gifs">GIFs</button>
            <button onclick="filterCategory('ai-tech')" class="tab" id="tab-ai-tech">AI Meme Tech</button>
            <button onclick="filterCategory('videos')" class="tab" id="tab-videos">Videos</button>
            <button onclick="filterCategory('other')" class="tab" id="tab-other">Other</button>
        </div>
    </div>

    <main class="page__section">
        <div class="page__container">
            <!-- CONTENT GRID (JS populates exactly as before) -->
            <div class="content-grid" id="meme-grid"></div>
        </div>
    </main>

    <!-- TOAST (global) -->
    <div id="toast" class="toast"></div>

    <!-- MEME MODAL (kept exact original structure + IDs for modal-generator.js) -->
    <div id="meme-modal" class="modal modal--hidden">
        <div class="modal__overlay" onclick="if(event.target === this) closeMemeModal()"></div>
        <div class="modal__content">
            <button onclick="closeMemeModal()" class="modal__close">✕</button>
            <button onclick="prevMeme()" class="nav-arrow nav-arrow-left">‹</button>
            <button onclick="nextMeme()" class="nav-arrow nav-arrow-right">›</button>

            <div class="modal__image-container" id="modal-image"></div>

            <div class="modal__body">
                <h2 id="modal-title" class="modal__title"></h2>
                <p id="modal-desc" class="modal__description"></p>
            </div>

            <div id="modal-buttons" class="modal__buttons">
                <!-- populated by JS -->
            </div>
        </div>
    </div>

    <!-- Footer injected by common.js – now styled properly -->

</body>
</html>

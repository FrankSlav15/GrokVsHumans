<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="portrait">
    <title>Memes - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <script src="assets/js/common.js" defer></script>
    <script src="assets/js/card-generator.js" defer></script>
    <script src="assets/js/modal-generator.js" defer></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M58E7KLM56"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-M58E7KLM56');</script>
</head>
<body data-page="memes">

    <section class="page__section">
        <div class="page__container">
            <h1 class="page__title">Meme Vault</h1>
            <p class="page__subtitle">Grok cooks humanity — the best of the best</p>

            <div class="sticky-tabs">
                <div class="sticky-tabs-container">
                    <div class="tabs-wrapper" id="tabs">
                        <button onclick="filterCategory('all')" class="tab tab-active" id="tab-all">All</button>
                        <button onclick="filterCategory('grok-memes')" class="tab" id="tab-grok-memes">Grok Memes</button>
                        <button onclick="filterCategory('political-memes')" class="tab" id="tab-political-memes">Political Memes</button>
                        <button onclick="filterCategory('misc-memes')" class="tab" id="tab-misc-memes">Miscellaneous Memes</button>
                        <button onclick="filterCategory('gifs')" class="tab" id="tab-gifs">GIFs</button>
                        <button onclick="filterCategory('ai-tech')" class="tab" id="tab-ai-tech">AI Meme Tech</button>
                        <button onclick="filterCategory('videos')" class="tab" id="tab-videos">Videos</button>
                        <button onclick="filterCategory('other')" class="tab" id="tab-other">Other</button>
                    </div>
                </div>
            </div>

            <div class="content-grid" id="meme-grid"></div>
        </div>
    </section>

    <div id="toast" class="toast"></div>

    <div id="meme-modal" class="modal hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[10000] p-0" onclick="if(event.target === this) closeMemeModal()">
    <div class="modal__content bg-zinc-950 rounded-3xl max-w-4xl w-full max-h-[94vh] flex flex-col overflow-hidden border border-purple-500/30 shadow-2xl" onclick="event.stopImmediatePropagation()">
        
        <!-- Close button -->
        <button onclick="closeMemeModal()" class="modal__close">✕</button>
        
        <!-- Navigation arrows -->
        <button onclick="prevMeme()" class="nav-arrow nav-arrow-left">‹</button>
        <button onclick="nextMeme()" class="nav-arrow nav-arrow-right">›</button>

        <div class="flex flex-col flex-1" id="modal-content-inner">
            
            <!-- Image / Video -->
            <div id="modal-image" class="modal__image-container flex-none bg-zinc-900 flex items-center justify-center min-h-0 p-2"></div>

            <!-- Title + Description -->
            <div class="px-6 pt-4 pb-3 border-t border-zinc-800 flex-shrink-0">
                <h2 id="modal-title" class="modal__title"></h2>
                <p id="modal-desc" class="modal__description"></p>
            </div>

            <!-- Genre section -->
            <div id="genre-section" class="genre-section hidden flex-shrink-0 p-4 bg-zinc-900 border-t border-zinc-800">
                <div class="genre-header text-purple-400 text-xs tracking-widest mb-2">SEE OTHER VARIATIONS OF</div>
                <div class="flex items-center justify-between">
                    <button onclick="prevGenreMeme()" class="text-4xl text-purple-400 hover:text-white">↓</button>
                    <div id="genre-name" class="text-white font-medium text-center"></div>
                    <button onclick="nextGenreMeme()" class="text-4xl text-purple-400 hover:text-white">↑</button>
                </div>
            </div>
        </div>

        <!-- Context panel -->
        <div id="context-panel" class="modal__context hidden p-6 bg-zinc-900 border-t border-purple-500/40">
            <div class="flex justify-between items-start gap-4">
                <p id="context-text" class="text-gray-300 text-sm leading-relaxed flex-1"></p>
                <button onclick="hideContextPanel()" class="text-3xl text-zinc-400 hover:text-white">✕</button>
            </div>
            <button onclick="searchMemeImage()" class="mt-5 w-full bg-white hover:bg-gray-100 text-black font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 transition-all">
                <i class="fa-solid fa-magnifying-glass"></i> Google Image Search
            </button>
        </div>

        <!-- Bottom buttons -->
        <div id="modal-buttons" class="modal__buttons">
            <a id="base-x-link" href="#" target="_blank" class="modal-btn-view flex-1">
                <i class="fa-brands fa-x-twitter"></i> View
            </a>
            <button onclick="showContextPanel()" class="modal-btn-context flex-1">
                <i class="fa-solid fa-info-circle"></i> Context
            </button>
            <button onclick="showMemeShareMenu()" class="modal-btn-share flex-1">
                <i class="fa-solid fa-share-nodes"></i> Share
            </button>
        </div>
    </div>
</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPage('memes');
        });
    </script>
</body>
</html>

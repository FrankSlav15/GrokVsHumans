<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Yours - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .cosmic-bg { background: radial-gradient(circle at center, #0a0a1f 0%, #000000 70%); min-height: 100vh; }
        .nav-link.active { color: rgb(168 85 247) !important; font-weight: 600; }
    </style>
</head>
<body class="bg-black text-white cosmic-bg">

    <!-- FINAL CENTERED NAVBAR -->
    <nav class="border-b border-purple-900/30 bg-black/90 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-6xl mx-auto px-6">
            <div class="flex justify-center py-4">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-cyan-400 rounded-full flex items-center justify-center text-black font-bold text-xl">G</div>
                    <h1 class="logo-font text-2xl font-semibold tracking-tighter">GrokVsHumans</h1>
                </a>
            </div>
            <div class="flex justify-center gap-x-8 gap-y-3 pb-4 text-sm font-medium" id="main-nav">
                <a href="battles.html" class="nav-link hover:text-purple-400 transition-colors">Battles</a>
                <a href="categories.html" class="nav-link hover:text-purple-400 transition-colors">Categories</a>
                <a href="memes.html" class="nav-link hover:text-purple-400 transition-colors">Memes</a>
                <a href="submit.html" class="nav-link hover:text-purple-400 transition-colors active">Submit</a>
            </div>
        </div>
    </nav>

    <section class="pt-40 pb-10">
        <div class="max-w-md mx-auto px-2">
            <div class="text-center mb-2">
                <h1 class="text-5xl font-bold tracking-tighter mb-2">Got a banger thread?</h1>
                <p class="text-gray-400 text-l">Paste the X link and we’ll review it for the hall of fame.</p>
            </div>

            <form action="https://formspree.io/f/mvzb1jkg" method="POST" class="space-y-2">
                <input type="url" name="thread_url" placeholder="https://x.com/..." required
                       class="w-full bg-white/5 border border-purple-900/50 focus:border-purple-500 rounded-3xl px-2 py-2 text-white placeholder-gray-500 focus:outline-none text-base">

                <input type="email" name="email" placeholder="Your email (so we can reply)" required
                       class="w-full bg-white/5 border border-purple-900/50 focus:border-purple-500 rounded-3xl px-2 py-2 text-white placeholder-gray-500 focus:outline-none text-base">

                <textarea name="reason" rows="4" placeholder="Optional: Why this thread is fire 🔥"
                          class="w-full bg-white/5 border border-purple-900/50 focus:border-purple-500 rounded-3xl px-2 py-2 text-white placeholder-gray-500 focus:outline-none text-base resize-none"></textarea>

                <button type="submit" 
                        class="w-full py-2 bg-gradient-to-r from-purple-600 to-violet-600 rounded-3xl font-semibold text-lg hover:scale-[1.02] transition-transform">
                    Send to the Team
                </button>
            </form>
        </div>
    </section>

    <footer class="py-12 border-t border-purple-900/30 text-center text-gray-500 text-sm">
        Built by <a href="https://x.com/SlavisTon" class="hover:text-purple-400">@SlavisTon</a> & Grok • 
        <a href="https://x.com/SlavisTon/status/2026768884854853692" class="hover:text-purple-400">The thread that started it all</a> • Launched Feb 27 2026
    </footer>

    <script>
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === window.location.pathname.split('/').pop()) {
                link.classList.add('active');
            }
        });
    </script>
</body>
</html>

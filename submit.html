<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Yours - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .cosmic-bg { background: radial-gradient(circle at center, #0a0a1f 0%, #000000 70%); min-height: 100vh; }
    </style>
</head>
<body class="bg-black text-white cosmic-bg flex flex-col min-h-screen">

   <!-- FINAL NAVBAR with auto-active highlighting -->
<nav class="border-b border-purple-900/30 bg-black/90 backdrop-blur-lg fixed w-full z-50">
    <div class="max-w-6xl mx-auto px-6">
        <!-- Logo centered -->
        <div class="flex justify-center py-4">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-8 h-8 bg-gradient-to-br from-purple-600 to-cyan-400 rounded-full flex items-center justify-center text-black font-bold text-xl">G</div>
                <h1 class="logo-font text-2xl font-semibold tracking-tighter">GrokVsHumans</h1>
            </a>
        </div>

        <!-- Main links (centered, auto-highlight current page) -->
        <div class="flex justify-center gap-x-8 gap-y-3 pb-4 text-sm font-medium" id="main-nav">
            <a href="battles.html" class="nav-link hover:text-purple-400 transition-colors">Battles</a>
            <a href="categories.html" class="nav-link hover:text-purple-400 transition-colors">Categories</a>
            <a href="memes.html" class="nav-link hover:text-purple-400 transition-colors">Memes</a>
            <a href="submit.html" class="nav-link hover:text-purple-400 transition-colors">Submit Yours</a>
        </div>

        <!-- Submit button (compact & positioned nicely) -->
        <div class="flex justify-center md:justify-end pb-4 md:pb-0 md:absolute md:top-4 md:right-6">
            <a href="submit.html" class="px-6 py-2.5 bg-gradient-to-r from-purple-600 to-violet-600 rounded-3xl font-medium text-sm flex items-center gap-2 hover:scale-105 transition-transform">
                <i class="fa-solid fa-plus"></i> Submit Battle
            </a>
        </div>
    </div>
</nav>
    <main class="flex-1 pt-24 pb-16">
        <div class="max-w-md mx-auto px-6 text-center">
            <h1 class="text-4xl font-bold mb-3">Got a banger thread?</h1>
            <p class="text-base text-gray-400 mb-10">Paste the X link and we’ll review it for the hall of fame.</p>

            <form action="https://formspree.io/f/mvzb1jkg" method="POST" class="space-y-5">
                <input type="url" name="thread" placeholder="https://x.com/..." required class="w-full bg-white/5 border border-purple-500/30 rounded-3xl px-5 py-3.5 text-white placeholder-gray-400 focus:outline-none focus:border-purple-400">
                <input type="email" name="email" placeholder="Your email (so we can reply)" class="w-full bg-white/5 border border-purple-500/30 rounded-3xl px-5 py-3.5 text-white placeholder-gray-400 focus:outline-none focus:border-purple-400">
                <textarea name="why" placeholder="Optional: Why this thread is fire 🔥" rows="3" class="w-full bg-white/5 border border-purple-500/30 rounded-3xl px-5 py-3.5 text-white placeholder-gray-400 focus:outline-none focus:border-purple-400"></textarea>
                <button type="submit" class="w-full bg-gradient-to-r from-purple-600 to-violet-600 py-3.5 rounded-3xl font-semibold text-base button-glow">Send to the Team</button>
            </form>
        </div>
    </main>

    <footer class="py-10 border-t border-purple-900/30 text-center text-gray-500 text-sm mt-auto">
        Built by <a href="https://x.com/SlavisTon" class="hover:text-purple-400">@SlavisTon</a> & Grok • <a href="https://x.com/SlavisTon/status/2026768884854853692" class="hover:text-purple-400">The thread that started it all</a> • Launched Feb 27 2026
    </footer>
</body>
</html>

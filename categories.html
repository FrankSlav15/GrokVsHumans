    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        html { height: 100%; }
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: #0a0a1f;
            position: relative;
            min-height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(10,10,31,0.82);
            z-index: -1; }

        .nav-link.active { color: rgb(168 85 247) !important; font-weight: 600; }

        .modal-content { 
            position: relative; 
            overflow: hidden; }
        .nav-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(0,0,0,0.75); color: white;
            width: 52px; height: 52px; display: flex; align-items: center; justify-content: center;
            font-size: 42px; border-radius: 9999px; z-index: 60;
            transition: all 0.2s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .nav-arrow:hover { background: rgba(0,0,0,0.95); transform: translateY(-50%) scale(1.1); }
        .nav-arrow-left  { left: -58px; }
        .nav-arrow-right { right: -58px; }

        @media (max-width: 640px) {
            .nav-arrow-left  { left: -42px; }
            .nav-arrow-right { right: -42px; }
            .nav-arrow { width: 44px; height: 44px; font-size: 36px; }
        }

        .category-card {
            transition: all 0.3s ease; cursor: pointer;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(168,85,247,0.2); 
            display: flex; flex-direction: column; height: 100%; overflow: hidden;
            border-radius: 1.5rem; position: relative; }
        .category-card:hover { 
            transform: translateY(-8px);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.5);
            border-color: rgb(168 85 247); }
        .category-card > img, .category-card > video { flex-shrink: 0; height: 15.5rem; width: 100%; object-fit: cover; border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem; }
        .category-card .content { flex: 1; padding: 1.25rem; background: #18181b; display: flex; flex-direction: column; }
        .category-card .title-area { min-height: 56px; display: flex; align-items: center; }
        .category-card .desc-area { flex: 1; min-height: 4rem; }

        /* FINAL MOBILE MODAL BUTTONS v3 - perfect spacing on categories (View on X + Share) */
        #category-modal .modal-content .buttons button,
        #category-modal .border-t.border-zinc-800 a,
        #category-modal .border-t.border-zinc-800 button {
            padding: 1rem 1.5rem !important;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            min-height: 58px;
            flex: 1;
        }
        #category-modal .modal-content .buttons button i,
        #category-modal .border-t.border-zinc-800 a i,
        #category-modal .border-t.border-zinc-800 button i {
            font-size: 1.35rem;
            flex-shrink: 0;
        }
        @media (max-width: 640px) {
            #category-modal .modal-content .buttons button,
            #category-modal .border-t.border-zinc-800 a,
            #category-modal .border-t.border-zinc-800 button {
                padding: 0.75rem 1.25rem !important;
                font-size: 0.93rem;
                gap: 0.5rem;
                min-height: 54px;
            }
            #category-modal .modal-content .buttons button i,
            #category-modal .border-t.border-zinc-800 a i,
            #category-modal .border-t.border-zinc-800 button i {
                font-size: 1.25rem;
            }
        }

        .tab {
            padding: 0.75rem 1.25rem;
            font-weight: 500;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .tab-active {
            border-bottom: 3px solid rgb(168 85 247);
            color: white;
        }
    </style>
</head>

                    <i class="fa-solid fa-plus"></i> Submit Battle
                </a>

    <section class="pt-80 md:pt-52 lg:pt-60 pb-16 flex-1">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold text-center mb-3">Categories</h1>
            <p class="text-center text-zinc-400 text-lg">Every Grok vs Humans clash, neatly sorted</p>

            <!-- Sticky Tabs -->
            <div class="sticky top-48 md:top-44 lg:top-52 z-40 bg-black/95 backdrop-blur-lg border-b border-purple-900/30 pb-4 mt-8 overflow-x-auto">
                <div class="flex justify-start md:justify-center px-4 md:px-6">
                    <div class="flex gap-1.5 md:gap-2 min-w-max overflow-x-auto pb-1" id="tabs">
                        <button onclick="filterCategory('all')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium tab-active whitespace-nowrap" id="tab-all">All</button>
                        <button onclick="filterCategory('lazy')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium whitespace-nowrap" id="tab-lazy">Grok, Think For Me</button>
                        <button onclick="filterCategory('politics')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium whitespace-nowrap" id="tab-politics">Politics</button>
                        <button onclick="filterCategory('photo')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium whitespace-nowrap" id="tab-photo">Photo Requests</button>
                        <button onclick="filterCategory('opinion')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium whitespace-nowrap" id="tab-opinion">Grok's Opinion</button>
                        <button onclick="filterCategory('avoids')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium whitespace-nowrap" id="tab-avoids">Grok Avoids Request</button>
                        <button onclick="filterCategory('other')" class="tab px-5 md:px-6 py-2 text-xs md:text-sm font-medium whitespace-nowrap" id="tab-other">Miscellaneous</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8 pt-10 items-stretch" id="category-grid"></div>
        </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 border border-purple-500 px-8 py-4 rounded-3xl shadow-2xl z-[100] transition-all duration-300">
        <span id="toast-text" class="font-medium text-white"></span>
    </div>

    <!-- CATEGORY MODAL -->
    <div id="category-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[1000] p-4" onclick="if(event.target === this) closeCategoryModal()">
        <div class="modal-content bg-zinc-950 rounded-3xl max-w-2xl w-full max-h-[94vh] flex flex-col overflow-hidden border border-purple-500/30 shadow-2xl" onclick="event.stopImmediatePropagation()">
            <button onclick="closeCategoryModal()" class="absolute top-5 right-5 z-30 bg-black/70 hover:bg-black text-white w-10 h-10 flex items-center justify-center rounded-2xl text-3xl transition-all">✕</button>
            <button onclick="event.stopImmediatePropagation(); prevCategory()" class="nav-arrow nav-arrow-left">‹</button>
            <button onclick="event.stopImmediatePropagation(); nextCategory()" class="nav-arrow nav-arrow-right">›</button>

            <div id="modal-image" class="w-full bg-zinc-800"></div>

            <div class="flex-1 min-h-0 overflow-y-auto p-8">
                <div id="modal-tags" class="flex flex-wrap gap-2 mb-6"></div>
                <h2 id="modal-title" class="text-3xl font-bold leading-tight mb-6"></h2>
                <p id="modal-description" class="text-gray-300 leading-relaxed mb-8"></p>
                
                <!-- FULL X THREAD EMBED -->
                <div id="tweet-embed" class="twitter-embed border border-zinc-700 rounded-2xl overflow-hidden"></div>
            </div>

            <div class="border-t border-zinc-800 p-6 flex gap-4 flex-shrink-0">
                <a id="modal-x-link" href="#" target="_blank" class="flex-1 bg-white hover:bg-gray-100 text-black font-semibold py-4 px-6 rounded-2xl flex items-center justify-center gap-3 transition-all text-base">
                    <i class="fa-brands fa-x-twitter text-3xl"></i>
                    <span class="text-center">View on X</span>
                </a>
                <button onclick="showCategoryShareMenu()" class="flex-1 border border-purple-500 hover:border-purple-400 hover:bg-purple-900/30 font-semibold py-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-share-nodes"></i> Share
                </button>
            </div>
        </div>
    </div>

    <script>
    // BACKGROUND ROTATOR
    const bgs = ['assets/images/backgrounds/bg1.webp','assets/images/backgrounds/bg2.webp','assets/images/backgrounds/bg3.webp','assets/images/backgrounds/bg4.webp','assets/images/backgrounds/bg5.webp','assets/images/backgrounds/bg6.webp','assets/images/backgrounds/bg7.webp','assets/images/backgrounds/bg8.webp','assets/images/backgrounds/bg9.webp','assets/images/backgrounds/bg10.webp','assets/images/backgrounds/bg11.webp','assets/images/backgrounds/bg12.webp','assets/images/backgrounds/bg13.webp','assets/images/backgrounds/bg14.webp','assets/images/backgrounds/bg15.webp','assets/images/backgrounds/bg16.webp','assets/images/backgrounds/bg17.webp','assets/images/backgrounds/bg18.webp','assets/images/backgrounds/bg19.webp','assets/images/backgrounds/bg20.webp'];
    const randomBg = bgs[Math.floor(Math.random() * bgs.length)];
    document.body.style.backgroundImage = `url('/${randomBg}')`;
    document.body.style.backgroundPosition = '50% 35%';
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundRepeat = 'no-repeat';
    document.body.style.backgroundAttachment = 'fixed';

    // FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyB00xfM91Dc1oqy37uFt34M_0VcL0xA8sE",
      authDomain: "grokvshumans.firebaseapp.com",
      databaseURL: "https://grokvshumans-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "grokvshumans",
      storageBucket: "grokvshumans.firebasestorage.app",
      messagingSenderId: "483683492125",
      appId: "1:483683492125:web:37d5dad0e8e8471b0b81f4"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allCategories = {};
    let currentCategoryId = null;
    let currentCategoryIndex = 0;
    let currentPlyr = null;

    async function loadCategories() {
        const snapshot = await database.ref('content/categories').once('value');
        allCategories = snapshot.val() || {};
        renderGrid();
        setTimeout(checkDeepLink, 400);
    }

    function renderGrid() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = '';
        Object.keys(allCategories).sort((a,b) => (allCategories[b].order || 0) - (allCategories[a].order || 0)).forEach(id => {
            const c = allCategories[id];
            const isVideo = c.image.toLowerCase().endsWith('.mp4') || c.image.toLowerCase().endsWith('.webm') || c.image.toLowerCase().endsWith('.mov');
            const mediaHTML = isVideo 
                ? `<video src="${c.image}" class="w-full h-full object-cover" loop muted playsinline></video>` 
                : `<img src="${c.image}" class="w-full h-full object-cover" alt="${c.title}">`;
            const cardHTML = `
                <div onclick="openCategoryModal(${id})" class="category-card rounded-3xl overflow-hidden block cursor-pointer flex flex-col h-full" data-categories="${(c.tags || '').split(',').join(',')}">
                    ${mediaHTML}
                    <div class="content">
                        <div class="title-area"><h4 class="font-semibold text-lg leading-tight line-clamp-2">${c.title}</h4></div>
                        <div class="desc-area flex-1"><p class="text-gray-400 text-sm line-clamp-4">${(c.description || '').substring(0,130)}...</p></div>
                    </div>
                </div>`;
            grid.insertAdjacentHTML('beforeend', cardHTML);
        });
    }

    function filterCategory(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
        document.getElementById('tab-' + cat).classList.add('tab-active');
        document.querySelectorAll('#category-grid > div').forEach(card => {
            const cats = (card.getAttribute('data-categories') || '').split(',').map(c => c.trim());
            card.style.display = (cat === 'all' || cats.includes(cat)) ? 'block' : 'none';
        });
    }

    function showToast(message) {
        const toast = document.getElementById('toast');
        const text = document.getElementById('toast-text');
        text.textContent = message;
        toast.classList.remove('hidden');
        toast.style.transform = 'translate(-50%, 0)';
        setTimeout(() => { toast.style.transform = 'translate(-50%, 80px)'; setTimeout(() => toast.classList.add('hidden'), 400); }, 2800);
    }

    function openCategoryModal(id) {
        const data = allCategories[id];
        if (!data) return;
        currentCategoryId = id;
        currentCategoryIndex = id;

        const url = data.image.toLowerCase();
        const isVideo = url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.mov');

        let mediaHTML = '';
        if (isVideo) {
            mediaHTML = `<video id="modal-video" src="${data.image}" class="w-full max-h-[70vh] object-contain mx-auto" autoplay loop muted playsinline></video>`;
        } else {
            mediaHTML = `<img src="${data.image}" class="w-full max-h-[70vh] object-contain mx-auto" alt="${data.title}">`;
        }
        document.getElementById('modal-image').innerHTML = mediaHTML;

        if (isVideo) {
            if (currentPlyr) currentPlyr.destroy();
            currentPlyr = new Plyr('#modal-video', { controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'], settings: [], tooltips: { controls: true, seek: true } });
        }

        const tagDisplay = { lazy: "Grok, Think For Me", politics: "Politics", photo: "Photo Requests", opinion: "Grok's Opinion", avoids: "Grok Avoids Request", other: "Miscellaneous" };
        const tagsHTML = (data.tags || '').split(',').map(t => `<span class="px-4 py-1 bg-purple-900/70 text-purple-200 text-xs rounded-full">${tagDisplay[t.trim()] || t.trim()}</span>`).join('');
        document.getElementById('modal-tags').innerHTML = tagsHTML;

        document.getElementById('modal-title').textContent = data.title || '';
        document.getElementById('modal-description').textContent = data.description || '';
        document.getElementById('modal-x-link').href = data.xLink || '#';

        // FULL X THREAD EMBED
        const embedDiv = document.getElementById('tweet-embed');
        embedDiv.innerHTML = `<blockquote class="twitter-tweet" data-theme="dark" data-conversation="all"><a href="${data.xLink}"></a></blockquote>`;
        if (window.twttr && window.twttr.widgets) {
            window.twttr.widgets.load(embedDiv);
        }

        const modal = document.getElementById('category-modal');
        modal.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    }

    function closeCategoryModal() {
        if (currentPlyr) {
            currentPlyr.pause();
            currentPlyr.destroy();
            currentPlyr = null;
        }
        document.getElementById('category-modal').classList.add('hidden');
        document.body.style.overflow = 'visible';
    }

    function showCategoryShareMenu() {
        if (!currentCategoryId) return;
        const data = allCategories[currentCategoryId];
        const baseUrl = window.location.origin + window.location.pathname;
        const shareUrl = `${baseUrl}#${currentCategoryId}`;
        const text = `Check out this category on GrokVsHumans: ${data.title} 🔥`;
        const shareHTML = `
            <div id="share-overlay" class="fixed inset-0 bg-black/90 flex items-center justify-center z-[99999]" onclick="closeCategoryShareMenu()">
                <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl p-8 max-w-xs w-full mx-4 border border-purple-500/30 shadow-2xl">
                    <h3 class="text-2xl font-semibold mb-8 text-center">Share this category</h3>
                    <div class="grid grid-cols-3 gap-6 text-center">
                        <button onclick="copyCategoryDeepLink('${shareUrl}');" class="flex flex-col items-center gap-2 hover:scale-110 transition-transform"><i class="fa-solid fa-link text-4xl text-purple-400"></i><span class="text-xs mt-1">Our Site</span></button>
                        <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(shareUrl)}" target="_blank" class="flex flex-col items-center gap-2 hover:scale-110 transition-transform"><i class="fa-brands fa-x-twitter text-4xl"></i><span class="text-xs mt-1">X</span></a>
                        <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}" target="_blank" class="flex flex-col items-center gap-2 hover:scale-110 transition-transform"><i class="fa-brands fa-facebook text-4xl text-blue-500"></i><span class="text-xs mt-1">Facebook</span></a>
                        <a href="#" onclick="copyToClipboard('${shareUrl}'); return false" class="flex flex-col items-center gap-2 hover:scale-110 transition-transform"><i class="fa-brands fa-instagram text-4xl text-pink-500"></i><span class="text-xs mt-1">Instagram</span></a>
                        <a href="#" onclick="copyToClipboard('${shareUrl}'); return false" class="flex flex-col items-center gap-2 hover:scale-110 transition-transform"><i class="fa-brands fa-tiktok text-4xl"></i><span class="text-xs mt-1">TikTok</span></a>
                        <a href="mailto:?subject=${encodeURIComponent(data.title)}&body=${encodeURIComponent(text + '\\n' + shareUrl)}" class="flex flex-col items-center gap-2 hover:scale-110 transition-transform"><i class="fa-solid fa-envelope text-4xl text-green-400"></i><span class="text-xs mt-1">Email</span></a>
                    </div>
                    <button onclick="closeCategoryShareMenu()" class="mt-10 w-full py-4 border border-zinc-700 rounded-2xl hover:bg-zinc-800 font-medium">Cancel</button>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', shareHTML);
    }

    function closeCategoryShareMenu() {
        const overlay = document.getElementById('share-overlay');
        if (overlay) overlay.remove();
    }

    function copyCategoryDeepLink(url) {
        navigator.clipboard.writeText(url).then(() => {
            showToast('✅ Link to this category copied!');
            closeCategoryShareMenu();
        });
    }

    function copyToClipboard(url) {
        navigator.clipboard.writeText(url).then(() => {
            showToast('✅ Link copied to clipboard!');
            closeCategoryShareMenu();
        });
    }

    function getCategoryKeys() {
        return Object.keys(allCategories).map(Number).sort((a,b) => a - b);
    }

    function nextCategory() {
        const keys = getCategoryKeys();
        let pos = keys.indexOf(currentCategoryIndex);
        if (pos === -1) pos = 0;
        const nextPos = (pos + 1) % keys.length;
        currentCategoryIndex = keys[nextPos];
        closeCategoryModal();
        setTimeout(() => openCategoryModal(currentCategoryIndex), 280);
    }

    function prevCategory() {
        const keys = getCategoryKeys();
        let pos = keys.indexOf(currentCategoryIndex);
        if (pos === -1) pos = 0;
        const prevPos = (pos - 1 + keys.length) % keys.length;
        currentCategoryIndex = keys[prevPos];
        closeCategoryModal();
        setTimeout(() => openCategoryModal(currentCategoryIndex), 280);
    }

    function checkDeepLink() {
        const hash = window.location.hash.replace('#', '');
        if (hash && !isNaN(hash)) {
            const id = parseInt(hash);
            if (allCategories[id]) openCategoryModal(id);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();
    });

    window.addEventListener('hashchange', checkDeepLink);

    document.addEventListener('keydown', e => {
        const modal = document.getElementById('category-modal');
        if (modal.classList.contains('hidden') || !currentCategoryId) return;
        if (e.key === 'Escape') closeCategoryModal();
        if (e.key === 'ArrowLeft') nextCategory();
        if (e.key === 'ArrowRight') prevCategory();
    });
    </script>

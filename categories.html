<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="portrait">
    <title>Categories - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M58E7KLM56"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-M58E7KLM56');</script>
    
</head>

<body data-page="categories">

    <!-- assets/partials/header.html -->
    <!-- (loaded by common.js) -->

    <section class="page__section">
        <div class="page__container">
            
            <h1 class="page__title">Categories</h1>
            <p class="page__subtitle">Every Grok vs Humans clash, neatly sorted</p>

            <!-- Sticky Tabs -->
            <div class="sticky-tabs">
                <div class="sticky-tabs-container">
                    <div class="tabs-wrapper" id="tabs">
                        <button onclick="filterCategory('all')" class="tab tab-active" id="tab-all">All</button>
                        <button onclick="filterCategory('lazy')" class="tab" id="tab-lazy">Grok, Think For Me</button>
                        <button onclick="filterCategory('politics')" class="tab" id="tab-politics">Politics</button>
                        <button onclick="filterCategory('photo')" class="tab" id="tab-photo">Photo Requests</button>
                        <button onclick="filterCategory('opinion')" class="tab" id="tab-opinion">Grok's Opinion</button>
                        <button onclick="filterCategory('avoids')" class="tab" id="tab-avoids">Grok Avoids Request</button>
                        <button onclick="filterCategory('other')" class="tab" id="tab-other">Miscellaneous</button>
                    </div>
                </div>
            </div>

            <!-- Category Grid -->
            <div class="content-grid" id="category-grid"></div>

        </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span id="toast-text"></span>
    </div>

    <!-- CATEGORIES MODAL (clean BEM only) -->
    <div id="category-modal" class="modal" onclick="if(event.target === this) closeCategoryModal()">
        <div class="modal__content" onclick="event.stopImmediatePropagation()">
            
            <!-- Close button -->
            <button onclick="closeCategoryModal()" class="modal__close">✕</button>
            
            <!-- Navigation arrows -->
            <button onclick="prevCategory()" class="nav-arrow nav-arrow-left">‹</button>
            <button onclick="nextCategory()" class="nav-arrow nav-arrow-right">›</button>

            <div class="modal__inner" id="modal-content-inner">
                
                <!-- Image -->
                <div id="modal-image" class="modal__image-container"></div>

                <!-- Content -->
                <div class="modal__body">
                    <!-- Tags -->
                    <div id="modal-tags" class="tags-area"></div>
                    
                    <!-- Title -->
                    <h2 id="modal-title" class="modal__title"></h2>
                    
                    <!-- Description -->
                    <p id="modal-description" class="modal__description"></p>
                    
                    <!-- Thread container (if needed) -->
                    <div id="thread-container" class="thread-container" data-entry-id=""></div>
                </div>
            </div>

            <!-- Bottom buttons -->
            <div id="modal-buttons" class="modal__buttons">
                <a id="modal-x-link" href="#" target="_blank" class="modal-btn-view">
                    <i class="fa-brands fa-x-twitter"></i> View
                </a>
                <button onclick="showCategoryShareMenu()" class="modal-btn-share">
                    <i class="fa-solid fa-share-nodes"></i> Share
                </button>
            </div>
        </div>
    </div>

    <!-- assets/partials/footer.html -->
    <!-- (loaded by common.js) -->

    <script src="assets/js/common.js"></script>
    <script src="assets/js/card-generator.js"></script>
    <script src="assets/js/modal-generator.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPage('categories');
        });
    </script>
</body>
</html>

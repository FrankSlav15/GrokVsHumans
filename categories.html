<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="screen-orientation" content="portrait">
    <title>Categories - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M58E7KLM56"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-M58E7KLM56');
    </script>

    <style>
        /* PAGE-SPECIFIC ONLY – Categories page (modernization branch) */
        .nav-arrow { position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.75);color:white;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:42px;border-radius:9999px;z-index:60;transition:all .2s ease;box-shadow:0 10px 30px rgba(0,0,0,.6); }
        .nav-arrow:hover { background:rgba(0,0,0,.95);transform:translateY(-50%) scale(1.1); }
        .nav-arrow-left { left:-58px; }
        .nav-arrow-right { right:-58px; }
        @media (max-width:640px) { .nav-arrow-left { left:-42px; } .nav-arrow-right { right:-42px; } .nav-arrow { width:44px;height:44px;font-size:36px; } }
        .category-card { transition:all .3s ease;cursor:pointer;background:rgba(255,255,255,.03);border:1px solid rgba(168,85,247,.2);display:flex;flex-direction:column;height:100%;overflow:hidden;border-radius:1.5rem;position:relative; }
        .category-card:hover { transform:translateY(-8px);box-shadow:0 0 40px rgba(168,85,247,.5);border-color:rgb(168 85 247); }
        .category-card .content { flex:1;padding:1.25rem;background:#18181b;display:flex;flex-direction:column; }
        .category-card .title-area { height:56px;display:flex;align-items:center; }
        .category-card .desc-area { flex:1; }
        .tab { padding:.75rem 1.25rem;font-weight:500;font-size:.875rem;transition:all .2s ease;white-space:nowrap; }
        .tab-active { border-bottom:3px solid rgb(168 85 247);color:white; }
        #modal-scroll-area { scrollbar-width:none;-ms-overflow-style:none; }
        #modal-scroll-area::-webkit-scrollbar { display:none; }

        /* ====================== MOBILE MODAL + SWIPE FIXES (modernization branch) ====================== */
        @media (max-width: 640px) {
          /* Perfect one-card fit + no stray scroll */
          .modal-content {
            max-height: 100dvh !important;
            border-radius: 0 !important;
            margin: 0 !important;
            width: 100% !important;
          }

          /* Battles & Categories — image scrolls away */
          #battle-modal #modal-scroll-area,
          #category-modal #modal-scroll-area {
            padding-top: 0;
          }
        }
    </style>

</head>

<body class="text-white" data-page="categories">

    <section class="pt-80 md:pt-52 lg:pt-60 pb-16 flex-1">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl lg:text-7xl font-bold text-center mb-3">Categories</h1>
            <p class="text-center text-zinc-400 text-lg">Every Grok vs Humans clash, neatly sorted</p>

            <!-- STICKY TABS - UNIFIED -->
            <div class="sticky-tabs">
                <div class="sticky-tabs-container">
                    <div class="tabs-wrapper" id="tabs">
                        <button onclick="filterCategory('all')" class="tab tab-active" id="tab-all">All</button>
                        <button onclick="filterCategory('lazy')" class="tab" id="tab-lazy">Grok, Think For Me</button>
                        <button onclick="filterCategory('politics')" class="tab" id="tab-politics">Politics</button>
                        <button onclick="filterCategory('photo')" class="tab" id="tab-photo">Photo Requests</button>
                        <button onclick="filterCategory('opinion')" class="tab" id="tab-opinion">Grok's Opinion</button>
                        <button onclick="filterCategory('avoids')" class="tab" id="tab-avoids">Grok Avoids Request</button>
                        <button onclick="filterCategory('other')" class="tab" id="tab-other">Miscellaneous</button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8 pt-10 items-stretch" id="category-grid"></div>
        </div>
    </section>

    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-zinc-900 border border-purple-500 px-8 py-4 rounded-3xl shadow-2xl z-[100] transition-all duration-300">
        <span id="toast-text" class="font-medium text-white"></span>
    </div>

    <!-- CATEGORIES MODAL -->
    <div id="category-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[1000] p-4" onclick="if(event.target === this) closeCategoryModal()">
        <div class="bg-zinc-950 rounded-3xl max-w-2xl w-full max-h-[94vh] flex flex-col overflow-hidden border border-purple-500/30 shadow-2xl" onclick="event.stopImmediatePropagation()">
            <button onclick="closeCategoryModal()" class="absolute top-5 right-5 z-30 bg-black/70 hover:bg-black text-white w-10 h-10 flex items-center justify-center rounded-2xl text-3xl transition-all">✕</button>
            <button onclick="event.stopImmediatePropagation(); prevCategory()" class="nav-arrow nav-arrow-left">‹</button>
            <button onclick="event.stopImmediatePropagation(); nextCategory()" class="nav-arrow nav-arrow-right">›</button>

            <div id="modal-scroll-area" class="flex-1 min-h-0 overflow-y-auto">
                <div id="modal-image" class="w-full bg-zinc-800"></div>
                
                <div class="p-8">
                    <div id="modal-tags" class="flex flex-wrap gap-2 mb-6"></div>
                    <h2 id="modal-title" class="text-3xl font-bold leading-tight mb-6"></h2>
                    <p id="modal-description" class="text-gray-300 leading-relaxed mb-8"></p>
                    
                    <!-- THREAD EMULATOR -->
                    <div id="thread-container" class="thread-container" data-entry-id=""></div>
                </div>
            </div>

            <!-- Clean white "View" button -->
            <div class="border-t border-zinc-800 p-6 flex gap-4 flex-shrink-0">
                <a id="modal-x-link" href="#" target="_blank" class="flex-1 bg-white hover:bg-gray-100 text-black font-semibold py-4 px-6 rounded-2xl flex items-center justify-center gap-3 transition-all text-base">
                    <i class="fa-brands fa-x-twitter text-3xl"></i>
                    <span class="text-center">View</span>
                </a>
                <button onclick="showCategoryShareMenu()" class="flex-1 border border-purple-500 hover:border-purple-400 hover:bg-purple-900/30 font-semibold py-4 rounded-2xl transition-all flex items-center justify-center gap-3">
                    <i class="fa-solid fa-share-nodes"></i> Share
                </button>
            </div>
        </div>
    </div>

    <script src="assets/js/common.js"></script>
    <script src="assets/js/card-generator.js"></script>
    <script src="assets/js/modal-generator.js"></script>

    <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB00xfM91Dc1oqy37uFt34M_0VcL0xA8sE",
      authDomain: "grokvshumans.firebaseapp.com",
      databaseURL: "https://grokvshumans-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "grokvshumans",
      storageBucket: "grokvshumans.firebasestorage.app",
      messagingSenderId: "483683492125",
      appId: "1:483683492125:web:37d5dad0e8e8471b0b81f4"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let allCategories = {};
    let currentCategoryId = null;
    let currentCategoryIndex = 0;

    async function loadCategories() {
        const snapshot = await database.ref('content/categories').once('value');
        allCategories = snapshot.val() || {};
        renderGrid();
        setTimeout(checkDeepLink, 400);
    }

    function renderGrid() {
        const grid = document.getElementById('category-grid');
        grid.innerHTML = '';

        Object.keys(allCategories)
            .sort((a, b) => (allCategories[b].order || 0) - (allCategories[a].order || 0))
            .forEach(id => {
                const cardHTML = createContentCard('categories', id, allCategories[id]);
                grid.insertAdjacentHTML('beforeend', cardHTML);
            });
    }

    function filterCategory(cat) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
        document.getElementById('tab-' + cat).classList.add('tab-active');
        document.querySelectorAll('#category-grid > div').forEach(card => {
            const cats = (card.getAttribute('data-categories') || '').split(',').map(c => c.trim());
            card.style.display = (cat === 'all' || cats.includes(cat)) ? 'block' : 'none';
        });
    }

    function openCategoryModal(id) {
        currentCategoryIndex = id;
        const data = allCategories[id];
        if (!data) return;
        currentCategoryId = id;

        populateModal('categories', id, data);

        document.getElementById('category-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';

        if (typeof renderThread === 'function') {
            renderThread(data.threadPosts || [], "thread-container");
        }
    }

    function closeCategoryModal() {
        document.getElementById('category-modal').classList.add('hidden');
        document.body.style.overflow = 'visible';
    }

    function nextCategory() {
        const keys = getSortedCategoryIds();
        let pos = keys.indexOf(currentCategoryIndex);
        if (pos === -1) pos = 0;
        const nextPos = (pos + 1) % keys.length;
        currentCategoryIndex = keys[nextPos];
        closeCategoryModal();
        setTimeout(() => openCategoryModal(currentCategoryIndex), 280);
    }

    function prevCategory() {
        const keys = getSortedCategoryIds();
        let pos = keys.indexOf(currentCategoryIndex);
        if (pos === -1) pos = 0;
        const prevPos = (pos - 1 + keys.length) % keys.length;
        currentCategoryIndex = keys[prevPos];
        closeCategoryModal();
        setTimeout(() => openCategoryModal(currentCategoryIndex), 280);
    }

    function getSortedCategoryIds() {
        return Object.keys(allCategories)
            .sort((a, b) => (allCategories[b].order || 0) - (allCategories[a].order || 0));
    }

    function checkDeepLink() {
        const hash = window.location.hash.replace('#', '');
        if (hash && !isNaN(hash)) {
            const id = hash;
            if (allCategories[id]) openCategoryModal(id);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();

        // UNIFIED SWIPE – right-to-left swipe = backward (recent → oldest) – modernization branch
        // Attached per-page so it works reliably on battles, categories, and memes
        const attachSwipeHandler = (modalId, prevFn, nextFn) => {
            const modal = document.getElementById(modalId);
            if (!modal) return;
            let touchStartX = 0;

            modal.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            });

            modal.addEventListener('touchend', e => {
                const touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;

                if (Math.abs(diff) < 50) return;

                // right → left swipe = previous card (as you requested)
                if (diff > 0) {
                    if (typeof prevFn === 'function') prevFn();
                } else {
                    if (typeof nextFn === 'function') nextFn();
                }
            });
        };

        // Page-specific swipe (only one modal exists per HTML file)
        if (typeof openBattleModal === 'function') {
            attachSwipeHandler('battle-modal', prevBattle, nextBattle);
        } else if (typeof openCategoryModal === 'function') {
            attachSwipeHandler('category-modal', prevCategory, nextCategory);
        } else if (typeof openMemeModal === 'function') {
            attachSwipeHandler('meme-modal', prevMeme, nextMeme);
        }
    });

    window.addEventListener('hashchange', checkDeepLink);

    document.addEventListener('keydown', e => {
        const modal = document.getElementById('category-modal');
        if (modal.classList.contains('hidden') || !currentCategoryId) return;
        if (e.key === 'Escape') closeCategoryModal();
        if (e.key === 'ArrowLeft') prevCategory();      // ← now correctly goes to previous
        if (e.key === 'ArrowRight') nextCategory();     // → now correctly goes to next
    });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Battles - GrokVsHumans</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/main.css">

    <!-- 🔥 Firebase SDK – REQUIRED for voting to work -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-M58E7KLM56"></script>
    <script>window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-M58E7KLM56');</script>
</head>

<body data-page="battles">

    <!-- assets/partials/header.html -->
    <!-- (loaded by common.js) -->

    <section class="page__section">
        <div class="page__container">
            
            <h1 class="page__title">Battles</h1>
            <p class="page__subtitle">Where Grok claims to tell the truth… and humans lose their minds</p>

            <!-- Sticky Tabs -->
            <div class="sticky-tabs">
                <div class="sticky-tabs-container">
                    <div class="tabs-wrapper" id="tabs">
                        <button onclick="filterCategory('all')" class="tab tab-active" id="tab-all">All</button>
                        <button onclick="filterCategory('nonsense')" class="tab" id="tab-nonsense">Nonsense</button>
                        <button onclick="filterCategory('political')" class="tab" id="tab-political">Political</button>
                        <button onclick="filterCategory('serious')" class="tab" id="tab-serious">Now, In All Seriousness</button>
                        <button onclick="filterCategory('citation')" class="tab" id="tab-citation">(UN)Popular Citations</button>
                        <button onclick="filterCategory('joke')" class="tab" id="tab-joke">Joke Battles</button>
                        <button onclick="filterCategory('censorship')" class="tab" id="tab-censorship">Conspiracy 1984</button>
                    </div>
                </div>
            </div>

            <!-- Battle Grid -->
            <div class="content-grid" id="battle-grid"></div>

        </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span id="toast-text"></span>
    </div>

    <!-- BATTLE MODAL (unified scroll – image disappears, metadata sticks) -->
    <div id="battle-modal" class="modal" onclick="if(event.target === this) closeModal()">
        <div class="modal__content" onclick="event.stopImmediatePropagation()">
            
            <!-- Close + arrows -->
            <button onclick="closeModal()" class="modal__close">✕</button>
            <button class="modal-nav modal-nav--prev" onclick="prevBattle()" aria-label="Previous battle">‹</button>
            <button class="modal-nav modal-nav--next" onclick="nextBattle()" aria-label="Next battle">›</button>

            <!-- SINGLE SCROLLABLE AREA -->
            <div class="modal__scroll-area">
            
            <!-- Image – scrolls away -->
            <div id="modal-image" class="modal__image-container"></div>

            <!-- Sticky metadata header -->
            <div class="modal__sticky-header">
                <div id="modal-tags" class="tags-area"></div>
                <h2 id="modal-title" class="modal__title"></h2>
                <p id="modal-description" class="modal__description"></p>
            </div>

            <!-- Thread content scrolls underneath -->
            <div class="modal__body-content">
                <div id="thread-container" class="thread-container"></div>
            </div>

            </div>

            <!-- Fixed scoreboard (always visible) -->
            <div class="modal__vote-bar">
            <button id="modal-grok-btn" onclick="voteFromModal(event, 'grok')" class="modal-btn-grok">Grok Won</button>
            <button id="modal-human-btn" onclick="voteFromModal(event, 'human')" class="modal-btn-human">Human Won</button>
            </div>

            <!-- Fixed action buttons -->
            <div id="modal-buttons" class="modal__buttons">
            <a id="modal-x-link" href="#" target="_blank" class="modal-btn-view">
                <i class="fa-brands fa-x-twitter"></i> Participate
            </a>
            <button onclick="showShareMenu()" class="modal__share-btn">
                <i class="fa-solid fa-share-from-square"></i> Share
            </button>
            </div>
        </div>
    </div>

    <!-- assets/partials/footer.html -->
    <!-- (loaded by common.js) -->

    <script src="assets/js/common.js"></script>
    <script src="assets/js/card-generator.js"></script>
    <script src="assets/js/modal-generator.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initPage('battles');
        });
    </script>
</body>
</html>

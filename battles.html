<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battles - GrokVsHumans</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .cosmic-bg { background: radial-gradient(circle at center, #0a0a1f 0%, #000000 70%); min-height: 100vh; }
        .battle-card { transition: all 0.3s ease; cursor: pointer; }
        .battle-card:hover { transform: translateY(-8px); box-shadow: 0 0 40px rgba(123,0,255,0.4); }
        .tab-active { border-bottom: 3px solid rgb(168 85 247); color: white; }
    </style>
</head>
<body class="bg-black text-white cosmic-bg">

    <!-- Navbar -->
    <nav class="border-b border-purple-900/30 bg-black/80 backdrop-blur-lg fixed w-full z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-purple-600 to-cyan-400 rounded-full flex items-center justify-center text-black font-bold text-2xl">G</div>
                <h1 class="logo-font text-3xl font-semibold tracking-tighter">GrokVsHumans</h1>
            </a>
            <div class="flex items-center gap-8 text-sm font-medium">
                <a href="battles.html" class="text-purple-400 font-semibold">Battles</a>
                <a href="categories.html" class="hover:text-purple-400">Categories</a>
                <a href="memes.html" class="hover:text-purple-400">Memes</a>
                <a href="submit.html" class="hover:text-purple-400">Submit Yours</a>
            </div>
            <a href="submit.html" class="px-6 py-2.5 bg-gradient-to-r from-purple-600 to-violet-600 rounded-3xl font-medium text-sm flex items-center gap-2">
                <i class="fa-solid fa-plus"></i> Submit Battle
            </a>
        </div>
    </nav>

    <section class="pt-32 pb-24">
        <div class="max-w-7xl mx-auto px-6">
            <h1 class="text-5xl font-bold text-center mb-12">Hall of Fame Battles</h1>

            <!-- Tabs -->
            <div class="flex flex-wrap justify-center gap-2 mb-12 border-b border-purple-900/30 pb-4" id="tabs">
                <button onclick="filterCategory('all')" class="tab px-6 py-2 text-sm font-medium tab-active" id="tab-all">All</button>
                <button onclick="filterCategory('nonsense')" class="tab px-6 py-2 text-sm font-medium" id="tab-nonsense">Nonsense</button>
                <button onclick="filterCategory('political')" class="tab px-6 py-2 text-sm font-medium" id="tab-political">Political</button>
                <button onclick="filterCategory('citation')" class="tab px-6 py-2 text-sm font-medium" id="tab-citation">(UN)Popular Citations</button>
                <button onclick="filterCategory('censorship')" class="tab px-6 py-2 text-sm font-medium" id="tab-censorship">Censorship 1984</button>
                <button onclick="filterCategory('joke')" class="tab px-6 py-2 text-sm font-medium" id="tab-joke">Joke Battles</button>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8" id="battles-grid">
                <!-- Your provided links + my filled blanks -->
                <a href="https://x.com/malcomtentrage/status/2026700176023339456" class="battle-card bg-white/5 border border-purple-900/50 rounded-3xl overflow-hidden block" data-category="nonsense">
                    <div class="h-48 bg-gradient-to-br from-gray-500 to-zinc-500 flex items-center justify-center text-7xl">🤪</div>
                    <div class="p-6">
                        <h4 class="font-semibold text-lg mb-2">Nonsense battle</h4>
                        <p class="text-gray-400 text-sm">Pure chaos</p>
                    </div>
                </a>
                <!-- More cards -->
            </div>
        </div>
    </section>

    <footer class="py-12 border-t border-purple-900/30 text-center text-gray-500 text-sm">
        Built by @SlavisTon & Grok • Launched Feb 27 2026
    </footer>

    <script>
        function filterCategory(cat) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-active'));
            document.getElementById('tab-' + cat).classList.add('tab-active');
            document.querySelectorAll('#battles-grid a').forEach(card => {
                if (cat === 'all') card.style.display = 'block';
                else card.style.display = card.getAttribute('data-category') === cat ? 'block' : 'none';
            });
        }
    </script>
</body>
</html>
